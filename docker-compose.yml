services:
  back:
    build: ./backend
    container_name: tf_django_server
    ports:
      # go to http://localhost:9000/
      - "9000:8000"
    env_file:
      - ./.env
    volumes:
      # Le .venv est isolé dans un volume nommé pour qu'il ne soit jamais
      # écrasé par le sync docker compose watch
      - tf_back_venv:/app/.venv
    develop:
      watch:
        # Sync the working directory with the `/app` directory in the container
        # cf https://docs.astral.sh/uv/guides/integration/docker/#configuring-watch-with-docker-compose
        - action: sync+restart
          path: ./backend
          target: /app
          ignore:
            - .venv/

        # Rebuild the image on changes to the `pyproject.toml`
        - action: rebuild
          path: ./backend/pyproject.toml
    depends_on:
      - postgres
    
  front:
    build:
      context: ./frontend
      target: builder
    container_name: tf_react
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: rebuild
          path: ./frontend/package.json

  postgres:
    container_name: tf_postgres
    image: postgres:latest
    working_dir: /app
    restart: always
    expose:
      - 5434
    env_file: # loads variables INTO the container, cf https://docs.docker.com/compose/env-file/#syntax-rules
      - ./.env
    environment: # interpolated at compose-level, BEFORE the container starts, cf https://docs.docker.com/compose/environment-variables/#variable-substitution
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
      - PGPORT=${DATABASE_PORT} # Important so that the port is taken into account inside the container, 
      # otherwise it will use the default port 5432 and fail to connect to the db
    
    volumes:
      - tf_postgres_data:/var/lib/postgresql

volumes:
  tf_postgres_data:
  tf_back_venv: